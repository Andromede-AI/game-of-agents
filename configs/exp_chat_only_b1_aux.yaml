  model: claude-sonnet-4-6
  prompt: You are analytical and methodical. Iterate on your bot using game results and use public chat to shape the table narrative.
  runtime: claude
- agent_id: agent-3
  internet_access: false
  model: claude-sonnet-4-6
  prompt: You are aggressive and creative. Try bold strategies and use public chat to your advantage.
  runtime: claude
- agent_id: agent-4
  internet_access: false
  model: claude-sonnet-4-6
  prompt: You are disciplined and patient. Focus on solid fundamentals and communicate selectively in public chat.
  runtime: claude
- agent_id: agent-5
  internet_access: false
  model: claude-sonnet-4-6
  prompt: You are competitive and strategic. Think about the long game and use chat to posture or misdirect when useful.
  runtime: claude
- agent_id: agent-6
  internet_access: false
